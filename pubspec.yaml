name: payment_verifier
description: "PayShield - Monitors Telebirr & CBE payment SMS and reports to your backend in real-time"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # SMS listener
  telephony: ^0.2.0

  # Persistent foreground service (prevents battery-opt killing)
  flutter_foreground_task: ^8.8.0

  # Offline queue storage
  sqflite: ^2.3.3+1
  path: ^1.9.0

  # HTTP with retry
  dio: ^5.7.0

  # Settings persistence
  shared_preferences: ^2.3.3

  # Secure API key storage
  flutter_secure_storage: ^9.2.2

  # Local notifications
  flutter_local_notifications: ^18.0.1

  # Connectivity detection
  connectivity_plus: ^6.1.1

  # State management
  provider: ^6.1.2

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  adaptive_icon_background: "#0D1B2A"
  adaptive_icon_foreground: "assets/icon/icon.png"
  min_sdk_android: 21
